<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Crypto Analysis Bot</title>
<style>
:root{
  --bg:#090d14;--card:#0d1421;--border:#1a2840;
  --cyan:#00d4ff;--green:#00ff88;--red:#ff3366;
  --yellow:#ffbb00;--orange:#ff8c00;
  --text:#b8cce0;--hi:#e8f4ff;--dim:#4a6080;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:#0b1220}
.logo{font-size:1.1rem;font-weight:bold;color:var(--cyan);letter-spacing:2px}
.logo span{color:var(--green)}
.hright{display:flex;gap:10px;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;background:var(--dim);display:inline-block}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.dot.off{background:var(--red)}
#statusLbl{font-size:.8rem;color:var(--dim);margin-left:4px}

/* Buttons */
.btn{padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:bold;transition:all .2s}
.btn-start{background:var(--green);color:#000}
.btn-start:hover{box-shadow:0 0 12px var(--green)}
.btn-stop{background:var(--red);color:#fff}
.btn-stop:hover{box-shadow:0 0 12px var(--red)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Fear & Greed bar */
.fg-bar{display:flex;align-items:center;gap:14px;padding:10px 24px;border-bottom:1px solid var(--border);background:#0b1220;font-size:.82rem}
.fg-label{color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.fg-val{font-size:1.2rem;font-weight:bold}
.fg-track{flex:1;max-width:200px;height:8px;border-radius:4px;background:linear-gradient(to right,var(--green),var(--yellow),var(--red));position:relative}
.fg-needle{position:absolute;top:-4px;width:4px;height:16px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.fg-text{color:var(--yellow)}

/* Main grid */
main{padding:20px 24px;display:flex;flex-direction:column;gap:16px}

/* Symbol cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

/* Symbol card */
.sym-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.sym-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sym-name{font-size:1rem;font-weight:bold;color:var(--hi);letter-spacing:1px}
.sym-price{font-size:1.4rem;font-weight:bold;color:var(--cyan)}
.sym-change{font-size:.78rem;margin-left:8px}
.chg-pos{color:var(--green)}
.chg-neg{color:var(--red)}

/* Signals */
.signals{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:22px}
.sig{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:bold;letter-spacing:.5px}
.sig-RSI_OVERSOLD   {background:rgba(0,255,136,.15);color:var(--green);border:1px solid var(--green)}
.sig-RSI_OVERBOUGHT {background:rgba(255,51,102,.15);color:var(--red);border:1px solid var(--red)}
.sig-MACD_BULLISH   {background:rgba(0,212,255,.15);color:var(--cyan);border:1px solid var(--cyan)}
.sig-MACD_BEARISH   {background:rgba(255,140,0,.15);color:var(--orange);border:1px solid var(--orange)}
.sig-VOLUME_SPIKE   {background:rgba(255,187,0,.15);color:var(--yellow);border:1px solid var(--yellow)}
.sig-NEAR_SUPPORT   {background:rgba(0,255,136,.1);color:var(--green);border:1px dashed var(--green)}
.sig-NEAR_RESISTANCE{background:rgba(255,51,102,.1);color:var(--red);border:1px dashed var(--red)}

/* Indicator grid inside card */
.ind-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.ind-item{background:#0a1220;border-radius:6px;padding:8px 10px}
.ind-lbl{font-size:.62rem;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.ind-val{font-size:.9rem;font-weight:bold;color:var(--hi);margin-top:3px}

/* SR row */
.sr-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.sr-item{background:#0a1220;border-radius:6px;padding:8px 10px;text-align:center}
.sr-lbl{font-size:.62rem;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.sr-val{font-size:.85rem;font-weight:bold;margin-top:3px}
.sr-sup{color:var(--green)}
.sr-res{color:var(--red)}

/* Alerts panel */
.alerts-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.panel-title{font-size:.7rem;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.alerts-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.alert-row{background:#0a1220;border-radius:6px;padding:8px 12px;display:flex;gap:10px;align-items:flex-start;font-size:.78rem;border-left:3px solid var(--border)}
.alert-row.RSI_OVERSOLD   {border-color:var(--green)}
.alert-row.RSI_OVERBOUGHT {border-color:var(--red)}
.alert-row.MACD_BULLISH   {border-color:var(--cyan)}
.alert-row.MACD_BEARISH   {border-color:var(--orange)}
.alert-row.VOLUME_SPIKE   {border-color:var(--yellow)}
.alert-row.NEAR_SUPPORT   {border-color:var(--green)}
.alert-row.NEAR_RESISTANCE{border-color:var(--red)}
.alert-sym{font-weight:bold;color:var(--hi);min-width:72px}
.alert-type{color:var(--cyan);min-width:130px}
.alert-price{color:var(--yellow)}
.alert-time{color:var(--dim);margin-left:auto;font-size:.7rem;white-space:nowrap}
.empty-msg{color:var(--dim);font-size:.8rem;text-align:center;padding:20px}

/* Status bar */
.ws-bar{font-size:.72rem;color:var(--dim);padding:6px 24px;border-top:1px solid var(--border);background:#0b1220;display:flex;gap:20px}
.ws-bar span{color:var(--cyan)}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flash{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.flash{animation:flash .4s ease}
</style>
</head>
<body>

<header>
  <div class="logo">CRYPTO<span>ALERT</span> BOT</div>
  <div class="hright">
    <span class="dot off" id="statusDot"></span>
    <span id="statusLbl">Offline</span>
    <button class="btn btn-start" id="btnStart" onclick="botStart()">▶ Start</button>
    <button class="btn btn-stop"  id="btnStop"  onclick="botStop()" disabled>■ Stop</button>
  </div>
</header>

<div class="fg-bar">
  <span class="fg-label">Fear &amp; Greed</span>
  <span class="fg-val" id="fgVal">—</span>
  <div class="fg-track"><div class="fg-needle" id="fgNeedle" style="left:50%"></div></div>
  <span class="fg-text" id="fgText">—</span>
</div>

<main>
  <div class="cards-grid" id="cardsGrid">
    <!-- filled by JS -->
  </div>

  <div class="alerts-panel">
    <div class="panel-title">Recent Alerts</div>
    <div class="alerts-list" id="alertsList">
      <div class="empty-msg">Belum ada alert — tekan Start untuk mulai analisis</div>
    </div>
  </div>
</main>

<div class="ws-bar">
  WebSocket: <span id="wsStatus">connecting…</span>
  &nbsp;|&nbsp; Last update: <span id="lastUpdate">—</span>
  &nbsp;|&nbsp; Symbols: <span id="symCount">—</span>
</div>

<script>
const SYMBOLS = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','DOGEUSDT'];
const SIG_LABELS = {
  RSI_OVERSOLD:'RSI OVERSOLD',RSI_OVERBOUGHT:'RSI OVERBOUGHT',
  MACD_BULLISH:'MACD ↑',MACD_BEARISH:'MACD ↓',
  VOLUME_SPIKE:'VOL SPIKE',NEAR_SUPPORT:'NEAR SUPPORT',NEAR_RESISTANCE:'NEAR RESIST',
};
let ws, wsRetries = 0;
let prevPrices = {};

// ── Build initial cards ──────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = SYMBOLS.map(sym => `
    <div class="sym-card" id="card-${sym}">
      <div class="sym-header">
        <span class="sym-name">${sym.replace('USDT','')}</span>
        <span>
          <span class="sym-price" id="price-${sym}">—</span>
          <span class="sym-change" id="chg-${sym}"></span>
        </span>
      </div>
      <div class="signals" id="sigs-${sym}"></div>
      <div class="ind-grid">
        <div class="ind-item"><div class="ind-lbl">RSI(14)</div><div class="ind-val" id="rsi-${sym}">—</div></div>
        <div class="ind-item"><div class="ind-lbl">MACD</div><div class="ind-val" id="macd-${sym}">—</div></div>
        <div class="ind-item"><div class="ind-lbl">Volume</div><div class="ind-val" id="vol-${sym}">—</div></div>
      </div>
      <div class="sr-row">
        <div class="sr-item"><div class="sr-lbl">Support</div><div class="sr-val sr-sup" id="sup-${sym}">—</div></div>
        <div class="sr-item"><div class="sr-lbl">Resistance</div><div class="sr-val sr-res" id="res-${sym}">—</div></div>
      </div>
    </div>
  `).join('');
}

// ── Update one symbol card ───────────────────────────────────────────────────
function updateCard(d) {
  const sym = d.symbol;
  const price = d.price;
  const prev = prevPrices[sym];
  prevPrices[sym] = price;

  const priceEl = document.getElementById('price-'+sym);
  if (priceEl) {
    priceEl.textContent = '$' + fmtPrice(price, sym);
    if (prev) {
      priceEl.classList.remove('flash');
      void priceEl.offsetWidth;
      priceEl.classList.add('flash');
      priceEl.style.color = price > prev ? 'var(--green)' : price < prev ? 'var(--red)' : 'var(--cyan)';
    }
  }

  const chgEl = document.getElementById('chg-'+sym);
  if (chgEl) {
    const chg = d.price_change_pct || 0;
    chgEl.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
    chgEl.className = 'sym-change ' + (chg >= 0 ? 'chg-pos' : 'chg-neg');
  }

  const rsiEl = document.getElementById('rsi-'+sym);
  if (rsiEl && d.rsi != null) {
    rsiEl.textContent = d.rsi.toFixed(1);
    rsiEl.style.color = d.rsi < 30 ? 'var(--green)' : d.rsi > 70 ? 'var(--red)' : 'var(--hi)';
  }

  const macdEl = document.getElementById('macd-'+sym);
  if (macdEl && d.macd) {
    const h = d.macd.histogram;
    macdEl.textContent = (h >= 0 ? '+' : '') + h.toFixed(4);
    macdEl.style.color = h >= 0 ? 'var(--green)' : 'var(--red)';
  }

  const volEl = document.getElementById('vol-'+sym);
  if (volEl && d.volume_spike) {
    volEl.textContent = d.volume_spike.ratio.toFixed(1) + 'x';
    volEl.style.color = d.volume_spike.spike ? 'var(--yellow)' : 'var(--hi)';
  }

  const supEl = document.getElementById('sup-'+sym);
  if (supEl && d.support) supEl.textContent = '$' + fmtPrice(d.support, sym);

  const resEl = document.getElementById('res-'+sym);
  if (resEl && d.resistance) resEl.textContent = '$' + fmtPrice(d.resistance, sym);

  const sigsEl = document.getElementById('sigs-'+sym);
  if (sigsEl) {
    const sigs = d.signals || [];
    sigsEl.innerHTML = sigs.length
      ? sigs.map(s => `<span class="sig sig-${s}">${SIG_LABELS[s]||s}</span>`).join('')
      : '<span style="color:var(--dim);font-size:.72rem">Tidak ada sinyal</span>';
  }
}

function fmtPrice(p, sym) {
  if (!p) return '—';
  if (sym === 'DOGEUSDT') return (+p).toFixed(5);
  if (p < 1) return (+p).toFixed(6);
  if (p < 100) return (+p).toFixed(4);
  return (+p).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

// ── Fear & Greed ─────────────────────────────────────────────────────────────
function updateFG(fg) {
  if (!fg) return;
  document.getElementById('fgVal').textContent = fg.value;
  document.getElementById('fgText').textContent = fg.label;
  document.getElementById('fgNeedle').style.left = fg.value + '%';
  const el = document.getElementById('fgVal');
  el.style.color = fg.value <= 30 ? 'var(--green)' : fg.value >= 70 ? 'var(--red)' : 'var(--yellow)';
}

// ── Handle WS message ────────────────────────────────────────────────────────
function handleUpdate(d) {
  updateFG(d.fear_greed);
  (d.symbols || []).forEach(updateCard);
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
  document.getElementById('symCount').textContent = (d.symbols||[]).length + ' aktif';
  if (d.bot_status === 'running') setBotRunning(true);
}

// ── Alerts ───────────────────────────────────────────────────────────────────
function prependAlert(a) {
  const list = document.getElementById('alertsList');
  const empty = list.querySelector('.empty-msg');
  if (empty) empty.remove();

  const ts = a.timestamp ? new Date(a.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
  const row = document.createElement('div');
  row.className = 'alert-row ' + (a.alert_type||'');
  row.innerHTML = `
    <span class="alert-sym">${a.symbol}</span>
    <span class="alert-type">${a.alert_type||''}</span>
    <span class="alert-price">${a.price ? '$'+fmtPrice(a.price, a.symbol) : ''}</span>
    <span class="alert-time">${ts}</span>
  `;
  list.insertBefore(row, list.firstChild);
  // keep max 30
  while (list.children.length > 30) list.removeChild(list.lastChild);
}

async function loadAlerts() {
  try {
    const r = await fetch('/api/alerts');
    const d = await r.json();
    const alerts = (d.alerts||[]).reverse();
    if (alerts.length) alerts.forEach(prependAlert);
  } catch(_) {}
}

// ── Bot controls ─────────────────────────────────────────────────────────────
async function botStart() {
  document.getElementById('btnStart').disabled = true;
  const r = await fetch('/api/start', {method:'POST'});
  const d = await r.json();
  if (!d.success) { alert(d.message); document.getElementById('btnStart').disabled = false; }
  else setBotRunning(true);
}

async function botStop() {
  document.getElementById('btnStop').disabled = true;
  const r = await fetch('/api/stop', {method:'POST'});
  const d = await r.json();
  if (!d.success) { alert(d.message); document.getElementById('btnStop').disabled = false; }
  else setBotRunning(false);
}

function setBotRunning(on) {
  document.getElementById('statusDot').className = 'dot ' + (on ? 'on' : 'off');
  document.getElementById('statusLbl').textContent = on ? 'Running' : 'Stopped';
  document.getElementById('btnStart').disabled = on;
  document.getElementById('btnStop').disabled = !on;
}

// ── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { wsRetries=0; setWS('connected','var(--green)'); };
  ws.onmessage = e => { try { handleUpdate(JSON.parse(e.data)); } catch(_){} };
  ws.onclose = () => { setWS('reconnecting…','var(--yellow)'); setTimeout(connectWS, Math.min(3000*(++wsRetries),30000)); };
  ws.onerror = () => ws.close();
}

function setWS(txt, color) {
  const el = document.getElementById('wsStatus');
  el.textContent = txt; el.style.color = color;
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  buildCards();
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    setBotRunning(d.running);
  } catch(_) {}
  await loadAlerts();
  connectWS();
}

init();
</script>
</body>
</html>
